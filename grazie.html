<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grazie — EdilPro Template</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; text-align: center; background: #F8FAFC;
            flex-direction: column; padding: 20px;
            font-family: 'Inter', sans-serif;
        }
        .success-card { 
            background: white; padding: 50px; border-radius: 12px;
            border: 1px solid #E2E8F0; width: 100%; max-width: 500px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); 
        }
        h1 { color: #16A34A; margin-bottom: 15px; font-size: 2rem; font-weight: 800; }
        p { color: #64748B; margin-bottom: 30px; line-height: 1.6; font-size: 1.1rem; }
        .btn-home { 
            background: #DC2626; color: white; padding: 14px 30px;
            text-decoration: none; border-radius: 6px; font-weight: 600;
            transition: 0.3s; display: inline-block;
        }
        .btn-home:hover { background: #B91C1C; }
        @media (max-width: 480px) {
            .success-card { padding: 30px 20px; }
            h1 { font-size: 1.6rem; }
            .btn-home { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div style="font-size: 60px; color: #16A34A; margin-bottom: 10px;">✓</div>
        <h1>Messaggio Inviato!</h1>
        <p>Grazie per averci contattato.<br>Abbiamo ricevuto la tua richiesta e ti risponderemo il prima possibile.</p>
        <a href="index.html" class="btn-home">Torna alla Home</a>
    </div>
    <script src="config.js"></script>
</body>
</html>
