<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grazie — EdilPro Template</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; text-align: center; background: var(--bg-primary);
            flex-direction: column; padding: 20px;
            font-family: 'Inter', sans-serif;
        }
        .success-card { 
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 52px;
            border-radius: 6px;
            border: 1px solid var(--border);
            width: 100%; max-width: 520px;
            box-shadow: var(--shadow-lg);
        }
        .success-icon { 
            width: 72px; height: 72px; border-radius: 50%;
            background: rgba(74,222,128,0.12);
            border: 1px solid rgba(74,222,128,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; margin: 0 auto 20px;
            color: #4ADE80;
        }
        h1 { color: var(--text-primary); margin-bottom: 15px; font-size: 2rem; font-weight: 900; font-family: 'Playfair Display', serif; }
        p { color: var(--text-secondary); margin-bottom: 32px; line-height: 1.7; font-size: 1.02rem; }
        .btn-home { 
            background: var(--accent); color: #060D1C; padding: 14px 32px;
            text-decoration: none; border-radius: 4px; font-weight: 700;
            font-size: 0.85rem; letter-spacing: 0.06em; text-transform: uppercase;
            transition: all 0.22s ease; display: inline-block;
        }
        .btn-home:hover { background: var(--accent-light); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(201,168,76,0.4); }
        @media (max-width: 480px) {
            .success-card { padding: 32px 20px; }
            h1 { font-size: 1.6rem; }
            .btn-home { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div style="font-size: 60px; color: #4ADE80; margin-bottom: 10px;">
            <div class="success-icon">✓</div>
        </div>
        <h1>Messaggio Ricevuto!</h1>
        <p>Grazie per averci contattato.<br>Il nostro team d'eccellenza ha ricevuto la tua richiesta e ti risponderà entro 24 ore.</p>
        <a href="index.html" class="btn-home">Torna alla Home</a>
    </div>
    <script src="config.js"></script>
</body>
</html>
